<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 1000 1000"
    width="300"
    height="300"
>
    <title>Day night animation</title>
    <defs>
        <radialGradient id="moon-gradient">
            <stop offset="20%" stop-color="#1e1e1e" />
            <stop offset="80%" stop-color="#333333" />
        </radialGradient>
        <!-- path that controls the movement of the moon and sun -->
        <path
            d="M -200,550 C 0,100 1100,100 1200,550 M 1200,-1000 -200,-1000 Z"
            id="sun-moon-motion"
        />
    </defs>
    <rect x="0" y="0" width="1000" height="1000" fill="lightblue">
        <!-- transition background between day and night -->
        <animate
            attributeName="fill"
            values="lightblue; lightblue; #010011; #010011"
            keyTimes="0; 0.45; 0.55; 1"
            dur="10s"
            fill="freeze"
            repeatCount="indefinite"
        />
    </rect>
    <g>
        <animateMotion
            dur="10s"
            repeatCount="indefinite"
            rotate="auto"
            keyPoints="0; 0.5; 1"
            keyTimes="0; 0.5; 1"
        >
            <mpath href="#sun-moon-motion" />
        </animateMotion>
        <animateTransform
            attributeName="transform"
            from="0"
            to="360"
            type="rotate"
            dur="6s"
            repeatCount="indefinite"
        />
        <circle cx="0" cy="0" r="100" fill="goldenrod" />
        <rect
            x="-20"
            y="-180"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(30)"
        />
        <rect
            x="-30"
            y="-180"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(60)"
        />
        <rect
            x="-20"
            y="-180"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(90)"
        />
        <rect
            x="-20"
            y="-180"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(120)"
        />
        <rect
            x="-20"
            y="-180"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(150)"
        />
        <rect
            x="-20"
            y="-170"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(180)"
        />
        <rect
            x="0"
            y="-170"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(210)"
        />
        <rect
            x="10"
            y="-170"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(240)"
        />
        <rect
            x="10"
            y="-170"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(270)"
        />
        <rect
            x="0"
            y="-170"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(300)"
        />
        <rect
            x="0"
            y="-180"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(330)"
        />
        <rect
            x="-10"
            y="-180"
            width="20"
            height="60"
            fill="goldenrod"
            transform="rotate(0)"
        />
    </g>

    <g>
        <g id="stars" opacity="0">
            <animate
                attributeName="opacity"
                values="1; 1; 0; 0"
                keyTimes="0; 0.5; 0.6; 1"
                dur="10s"
                begin="5s"
                repeatCount="indefinite"
            />

            <path
                fill="#e0ce6b"
                transform="translate(100,100) scale(0.5)"
                d="M 20,20 30,0 40,20 50,30 70,40 50,40 40,50 30,60 20,50 10,30 Z"
            />
            <path
                fill="#e0ce6b"
                transform="translate(180,800) scale(0.3) rotate(100)"
                d="M 20,20 30,0 40,20 50,30 70,40 50,40 40,50 30,60 20,50 10,30 Z"
            />
            <path
                fill="#e0ce6b"
                transform="translate(600,800) scale(0.8) rotate(200)"
                d="M 20,20 30,0 40,20 50,30 60,30 40,40 40,50 30,60 20,40 10,40 Z"
            />
            <path
                fill="#e0ce6b"
                transform="translate(230,600) scale(0.4) rotate(300)"
                d="M 20,20 30,0 40,20 50,30 70,40 50,40 40,50 30,60 20,50 10,30 Z"
            />
            <path
                fill="#e0ce6b"
                transform="translate(830,300) scale(0.35) rotate(300)"
                d="M 20,20 30,0 40,20 50,30 70,40 50,40 40,50 30,60 20,50 10,30 Z"
            />
            <path
                fill="#e0ce6b"
                transform="translate(630,250) scale(0.5) rotate(100)"
                d="M 20,20 30,0 40,20 50,30 70,40 50,40 40,50 30,60 20,50 10,30 Z"
            />
        </g>
        <g id="moon">
            <animateMotion dur="5s" from="-200,550" to="-200,550" />
            <animateMotion
                dur="10s"
                begin="5s"
                repeatCount="indefinite"
                rotate="auto"
                keyPoints="0; 0.5; 1"
                keyTimes="0; 0.5; 1"
            >
                <mpath href="#sun-moon-motion" />
            </animateMotion>
            <circle cx="0" cy="-100" r="90" fill="url('#moon-gradient')" />
            <circle cx="50" cy="-120" r="15" fill="#1a1a1a" />
            <circle cx="-40" cy="-80" r="25" fill="#202020" />
            <circle cx="-20" cy="-140" r="20" fill="#1d1d1d" />
        </g>
    </g>
</svg>
