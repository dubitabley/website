<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="250 250 750 750"
    width="300"
    height="300"
>
    <defs>
        <linearGradient
            id="red-gradient"
            x1="500"
            y1="250"
            x2="500"
            y2="750"
            gradientUnits="userSpaceOnUse"
        >
            <stop offset="0%" stop-color="#ff0000aa" />
            <stop offset="95%" stop-color="transparent" />
        </linearGradient>
        <linearGradient
            id="green-gradient"
            x1="250"
            y1="750"
            x2="625"
            y2="600"
            gradientUnits="userSpaceOnUse"
        >
            <stop offset="0%" stop-color="#00ff00aa" />
            <stop offset="95%" stop-color="transparent" />
        </linearGradient>
        <linearGradient
            id="blue-gradient"
            x1="750"
            y1="750"
            x2="375"
            y2="450"
            gradientUnits="userSpaceOnUse"
        >
            <stop offset="0%" stop-color="#0000ffaa" />
            <stop offset="95%" stop-color="transparent" />
        </linearGradient>
    </defs>
    <title>favicon</title>
    <g>
        <circle
            fill="none"
            stroke="red"
            stroke-width="20"
            cx="500"
            cy="250"
            r="100"
        />
        <circle
            fill="none"
            stroke="green"
            stroke-width="20"
            cx="250"
            cy="750"
            r="100"
        />
        <circle
            fill="none"
            stroke="blue"
            stroke-width="20"
            cx="750"
            cy="750"
            r="100"
        />
        <path d="M 500,250 250,750 750,750 Z" fill="url(#red-gradient)" />
        <path d="M 500,250 250,750 750,750 Z" fill="url(#green-gradient)" />
        <path d="M 500,250 250,750 750,750 Z" fill="url(#blue-gradient)" />
    </g>
</svg>
